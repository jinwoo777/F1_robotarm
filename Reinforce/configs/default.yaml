# 모든 숫자는 기능 확인을 위한 demo 값이며 실제 M0609 안전 한계가 아닙니다.
pan:
  stl_path: ../Wok.stl
  stl_scale: 0.001
  mass_kg: 0.700
  kinematic: true
  use_procedural_demo: false
  collision_mode: compound_proxy
  collision_proxy:
    inner_radius_m: 0.112
    bottom_radius_m: 0.052
    bottom_thickness_m: 0.006
    wall_height_m: 0.058
    wall_thickness_m: 0.006
    wall_segments: 24
    rim_radius_m: 0.116
  initial_pose:
    position_m: [0.0, 0.0, 0.20]
    rpy_rad: [0.0, 0.0, 0.0]

particles:
  count: 32
  density_kg_m3: 900.0
  nominal_radius_m: 0.010
  radius_jitter_fraction: 0.12
  mass_tolerance_kg: 1.0e-9
  target_mass_range_kg: [0.080, 0.200]
  spawn_radius_m: 0.065
  spawn_height_m: 0.012
  spawn_clearance_m: 0.0005
  max_spawn_attempts: 10000
  friction: 0.55
  restitution: 0.08
  linear_damping: 0.05
  angular_damping: 0.03
  settle_time_s: 0.50
  settle_velocity_threshold: 0.03

trajectory:
  cycles: 5
  insertion_angle_deg: 45.0
  insertion_distance_range_m: [0.025, 0.055]
  lift_height_range_m: [0.045, 0.085]
  backward_distance_range_m: [0.035, 0.075]
  pitch_amplitude_range_rad: [0.10, 0.35]
  cycle_time_range_s: [0.90, 1.50]
  insert_phase_ratio_range: [0.18, 0.30]
  catch_phase_ratio_range: [0.16, 0.28]
  transition_forward_offset_m: 0.008
  transition_lift_offset_m: 0.008
  catch_offset_m: [-0.010, 0.0, 0.020]
  sample_rate_hz: 100.0
  max_cartesian_velocity: 1.5
  max_cartesian_acceleration: 15.0
  max_cartesian_jerk: 300.0
  workspace:
    x_m: [-0.20, 0.20]
    y_m: [-0.01, 0.01]
    z_m: [0.08, 0.36]
    pitch_rad: [-0.70, 0.70]
  y_tolerance: 1.0e-7
  roll_tolerance: 1.0e-7
  yaw_tolerance: 1.0e-7
  start_position_m: [0.0, 0.0, 0.20]
  start_rpy_rad: [0.0, 0.0, 0.0]

simulation:
  timestep_s: 0.002
  gravity_m_s2: [0.0, 0.0, -9.81]
  post_rollout_settle_s: 0.75
  contact_gap_tolerance_s: 0.025
  spill_grace_time_s: 0.20
  spill_boundary_radius_m: 0.145
  spill_boundary_below_rim_m: 0.10
  max_steps: 20000

mixing:
  label_mode: quadrant
  grid_rows: 4
  grid_cols: 4
  minimum_particles_per_cell: 1
  pan_radius_m: 0.112

reward:
  w_mix: 3.0
  w_spill: 8.0
  w_jerk: 0.05
  w_acc: 0.05
  w_invalid: 20.0
  jerk_normalization: 100000.0
  acceleration_normalization: 1000.0
  height_penalty_enabled: false
  maximum_height_m: 0.30
  w_height: 0.0

robot:
  enabled: false
  required: false
  urdf_path: null
  base_link: null
  tcp_link: null
  q_teach: null
  T_base_tcp_teach: null
  T_tcp_pan: null
  T_base_wok: null
  joint_velocity_limits: null
  joint_acceleration_limits: null
  branch_jump_threshold_rad: null
  collision_check: false

training:
  algorithm: SAC
  total_timesteps: 10000
  seed: 7
  target_mass_sampling: uniform
  observation_radius_stats: false
  learning_rate: 0.0003
  buffer_size: 50000
  learning_starts: 100
  batch_size: 128
  evaluation_interval: 1000
  evaluation_episodes: 5
  checkpoint_directory: checkpoints

logging:
  output_directory: results
  save_particle_trajectories: false
  save_video: false
  save_csv: true
  save_npz: true
